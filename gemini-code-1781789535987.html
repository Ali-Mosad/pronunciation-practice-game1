<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي القاموس المصور - أكاديمية عون</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f0fdf4; }
        .game-btn { transition: all 0.3s; transform: scale(1); }
        .game-btn.selected { background-color: #3b82f6; color: white; border-color: #2563eb; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .game-btn.matched { background-color: #10b981; color: white; border-color: #059669; transform: scale(0.95); opacity: 0.7; pointer-events: none; }
        .shake-error { animation: shake 0.4s ease-in-out; background-color: #ef4444 !important; color: white !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }
        .cloze-select { padding: 5px 10px; cursor: pointer; border-radius: 8px; border: 2px solid #93c5fd; background-color: #eff6ff; }
        .correct-select { border-color: #10b981 !important; background-color: #d1fae5 !important; }
        .wrong-select { border-color: #ef4444 !important; background-color: #fee2e2 !important; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-blue-50">
        <!-- Header -->
        <div style="background-color: #29388f;" class="p-6 text-white text-center border-b-4 border-blue-900">
            <img src="https://c.top4top.io/p_38212tqjf1.png" alt="Aoun Academy Logo" class="h-24 mx-auto mb-4 object-contain">
            <h1 class="text-3xl font-black">تحدي القاموس المصور</h1>
            <div class="mt-2 text-xs bg-black bg-opacity-30 inline-block px-3 py-1 rounded-lg">By: Mr. Ali Mosad</div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="p-10 text-center">
            <h2 class="text-2xl font-bold mb-6">مرحباً يا بطل في التحدي المزدوج!</h2>
            <button onclick="startGame()" class="bg-blue-600 text-white font-bold py-4 px-10 rounded-full text-xl shadow-lg">إبدأ التحدي الآن 🚀</button>
        </div>

        <!-- Game Container -->
        <div id="game-container" class="p-6 hidden bg-gray-50">
            <div class="flex justify-between mb-6 font-bold text-indigo-700">
                <span id="round-display">المرحلة: 1 / 3</span>
                <span id="score-display">النقاط: 0</span>
            </div>
            <div class="flex flex-row-reverse gap-4">
                <div class="w-1/2 flex flex-col gap-3" id="english-words"></div>
                <div class="w-1/2 flex flex-col gap-3" id="arabic-words"></div>
            </div>
            <button id="next-round-btn" onclick="nextRound()" class="mt-6 w-full bg-indigo-600 text-white py-3 rounded-xl hidden font-bold">المرحلة التالية 🎯</button>
        </div>

        <!-- Reading Section -->
        <div id="reading-container" class="p-8 hidden bg-blue-50">
            <h2 class="text-2xl font-black text-blue-900 mb-6 text-center">مغامرة القراءة!</h2>
            <div class="bg-white p-6 rounded-2xl border-2 border-blue-100 text-xl leading-loose font-bold" dir="ltr">
                Hello! I am a young <select id="r1" data-answer="guy" class="cloze-select"></select>. 
                I love my <select id="r2" data-answer="life" class="cloze-select"></select>.
                Every <select id="r3" data-answer="day" class="cloze-select"></select> is a <select id="r4" data-answer="great" class="cloze-select"></select> chance.
            </div>
            <button onclick="checkReading()" class="mt-6 w-full bg-blue-600 text-white py-3 rounded-xl font-bold">تحقق ✔️</button>
            <button id="finish-btn" onclick="endGame()" class="mt-6 w-full bg-green-500 text-white py-3 rounded-xl font-bold hidden">أظهر النتيجة 🏆</button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="p-10 text-center hidden">
            <h2 class="text-3xl font-black text-blue-900 mb-4" id="final-score">0 / 24</h2>
            <input type="text" id="student-name" placeholder="اكتب اسمك الثلاثي..." class="w-full p-4 border-2 rounded-xl mb-4 text-right">
            <button onclick="sendToWhatsApp()" class="w-full bg-green-500 text-white py-4 rounded-xl font-black">إرسال النتيجة عبر الواتساب</button>
        </div>
    </div>

    <script>
        // البيانات
        const vocabulary = [
            { en: "People", ar: "أناس", emoji: "👨‍👩‍👧‍👦", id: 1 }, { en: "Thing", ar: "شيء", emoji: "📱", id: 2 },
            { en: "Way", ar: "طريق", emoji: "🛤️", id: 3 }, { en: "Year", ar: "سنة", emoji: "🌳", id: 4 },
            { en: "Month", ar: "شهر", emoji: "📅", id: 5 }, { en: "Day", ar: "يوم", emoji: "🌅", id: 6 },
            { en: "Life", ar: "حياة", emoji: "🌱", id: 7 }, { en: "Guy", ar: "رجل / شاب", emoji: "🙋‍♂️", id: 8 },
            { en: "World", ar: "عالم", emoji: "🌍", id: 9 }, { en: "Part", ar: "جزء", emoji: "🧩", id: 10 },
            { en: "Other", ar: "آخر", emoji: "👕", id: 11 }, { en: "Little", ar: "صغير", emoji: "🐈", id: 12 },
            { en: "New", ar: "جديد", emoji: "🎁", id: 13 }, { en: "Great", ar: "عظيم", emoji: "🏅", id: 14 },
            { en: "Different", ar: "مختلف", emoji: "🌼", id: 15 }
        ];

        // منطق اللعبة (مبسط ليعمل مباشرة)
        let matchScore = 0, readingScore = 0, currentRound = 0, matchedInCurrentRound = 0;
        
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            loadRound();
        }

        function loadRound() {
            const currentData = vocabulary.slice(currentRound * 5, (currentRound + 1) * 5);
            const enWords = document.getElementById('english-words');
            const arWords = document.getElementById('arabic-words');
            enWords.innerHTML = arWords.innerHTML = '';
            
            currentData.forEach(item => {
                const enBtn = document.createElement('button');
                enBtn.className = "game-btn p-2 bg-white border rounded-xl font-bold flex items-center";
                enBtn.innerHTML = `<span>${item.emoji} ${item.en}</span>`;
                enBtn.onclick = () => { /* منطق التوصيل هنا */ alert("جاري التطوير..."); };
                enWords.appendChild(enBtn);
            });
            // ... (باقي منطق التوصيل)
        }

        function sendToWhatsApp() {
            const name = document.getElementById('student-name').value;
            const phoneNumber = "YOUR_PHONE_NUMBER"; // ⚠️ ضع رقمك هنا
            const message = `أنا الطالب/ة: ${name}، نتيجتي هي: ${matchScore + readingScore} من 24`;
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
